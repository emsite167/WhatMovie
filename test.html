<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Test API</title></head>
<body style="font-family:sans-serif;padding:2rem;background:#1a1a1a;color:#fff">
<h2>🔧 Test API Groq</h2>
<button id="btn" style="background:#c44b2b;color:#fff;border:none;padding:12px 24px;border-radius:8px;font-size:15px;cursor:pointer">
  Tester l'IA
</button>
<div id="result" style="margin-top:1.5rem;padding:1rem;border-radius:8px;background:#2a2a2a;min-height:60px;font-size:14px;line-height:1.6"></div>

<script>
document.getElementById('btn').onclick = async () => {
  const r = document.getElementById('result');
  r.textContent = '⏳ Test en cours...';
  try {
    const res = await fetch('/api/ai', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        messages: [{ role: 'user', content: 'Dis juste: GROQ FONCTIONNE' }],
        max_tokens: 20
      })
    });
    const data = await res.json();
    if(data.error) {
      r.style.background = '#3a1a1a';
      r.textContent = '❌ Erreur: ' + (data.error.message || JSON.stringify(data.error));
    } else {
      const text = data.content?.[0]?.text || JSON.stringify(data);
      r.style.background = '#1a3a1a';
      r.textContent = '✅ ' + text;
    }
  } catch(e) {
    r.style.background = '#3a1a1a';
    r.textContent = '❌ ' + e.message;
  }
};
</script>
</body>
</html>
